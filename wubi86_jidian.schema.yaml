# Rime schema settings
# encoding: utf-8
#
# 基于 wubi98_mint.schema.yaml 改写,使用 wubi86_jidian 字典
# - 拼音/五笔98 全部移除,只保留五笔86 为主码
# - 保留 pinyin/chaizi/stroke 反查(需前缀触发),不与"舍弃拼音"冲突

schema:
  schema_id: wubi86_jidian
  name: "五笔八六-极点简版"
  version: "1.0"
  author:
    - 發明人 王永民
    - Mintimate (wubi98_mint 模板)
    - Wangdong (wubi86_jidian port)
  description: |
    基于五笔86版(极点码表)输入
    码表源自 wubi86_jidian.dict.yaml (4.3)
    保留拼音/笔画/拆字反查(需前缀)
  dependencies:
    - melt_eng # 英文方案

switches:
  - name: ascii_mode
    reset: 0
    states: [中文, 英文]
  - name: emoji_suggestion
    reset: 1
    states: ["😣️", "😁️"]
  - name: full_shape
    states: [半角, 全角]
  - name: transcription
    reset: 0
    states: [简体, 繁体]
  - name: ascii_punct
    states: [。，, ．，]

engine:
  filters:
    - simplifier
    - simplifier@emoji_suggestion
    - lua_filter@autocap_filter # 英文自动大写
    - simplifier@transcription_cc
    - lua_filter@reduce_english_filter # 降低部分英语单词在候选项的位置
    - uniquifier
  processors:
    - ascii_composer
    - recognizer
    - key_binder
    - speller
    - punctuator
    - selector
    - navigator
    - express_editor
  segmentors:
    - ascii_segmentor
    - matcher
    - affix_segmentor@wubi86_jidian
    - affix_segmentor@chaizi
    - affix_segmentor@stroke
    - affix_segmentor@pinyin_reverse_lookup
    - abc_segmentor
    - punct_segmentor
    - fallback_segmentor
  translators:
    - punct_translator # ※ 轉換標點符號
    - script_translator
    - lua_translator@date_translator # 日期Lua
    - lua_translator@time_translator # 时间Lua
    - lua_translator@week_translator # 星期Lua
    - lua_translator@number_translator # 金额大小写
    - lua_translator@Chinese_lunar_calendar    # 农历
    - table_translator@melt_eng # 英文输入（作为子翻译器，优先级需要比原生的低）
    - reverse_lookup_translator@wubi86_jidian
    - reverse_lookup_translator@chaizi
    - reverse_lookup_translator@stroke
    - reverse_lookup_translator@pinyin_reverse_lookup

speller:
  auto_select: true
  auto_clear: max_length
  delimiter: "`"
  max_code_length: 10 # 最大输入字符(为了兼容英文输入)

# 简繁切换
transcription_cc:
  option_name: transcription
  opencc_config: s2t.json # s2t.json | s2hk.json | s2tw.json | s2twp.json
  tips: none # 转换提示: all 都显示 | char 仅单字显示 | none 不显示。
  excluded_types: [reverse_lookup] # 不转换反查(两分拼字)的内容

translator:
  dictionary: wubi86_jidian
  db_class: tabledb
  initial_quality: 100000
  enable_charset_filter: false
  enable_sentence: false
  enable_encoder: false
  encode_commit_history: false
  max_phrase_length: 4
  enable_completion: false
  enable_user_dict: false
  disable_user_dict_for_patterns:
    - "^z.*$"

melt_eng:
  dictionary: melt_eng # 英文词典
  enable_sentence: false # 关闭自动造词
  enable_completion: false # 关闭自动提示
  initial_quality: 0.8

recognizer:
  import_preset: default
  patterns:
    email: "^[A-Za-z][-_.0-9A-Za-z]*@.*$"
    punct: "^/([0-9]0?|[A-Za-z]+)$"
    uppercase: "[A-Z][-_+.'0-9A-Za-z]*$"
    url: "^(www[.]|https?:|ftp[.:]|mailto:|file:).*$|^[a-z]+[.].+$"
    pinyin_lookup: "^z[a-z]*$" # 拼音反查(优先于主码,避免 z 前缀被主码吞掉)
    stroke: "ui[a-z]*'?$" # 笔画反查
    chaizi: "uu[a-z]*'?$" # 拆字反查
    wubi86_jidian: "^[a-z]+'?$" # 默认: 五笔86 主码(放最后,作为 catch-all)
    rmb: "^R[0-9]+[.]?[0-9]*" # 响应 lua_translator@number_translator 脚本将自动获取第 2 个字符作为触发前缀
    gregorian_to_lunar: "^N[0-9]{1,8}" # 响应 lua_translator@Chinese_lunar_calendar 公历转农历，输入 N20240115 得到「二〇二四年腊月初五」，脚本将自动获取第 2 个字符作为触发前缀

history:
  input: z
  size: 1
  initial_quality: 1

# 中国农历配置
Chinese_lunar_calendar: lunar

pinyin_reverse_lookup:
  tag: pinyin_lookup
  dictionary: pinyin
  enable_completion: true
  prefix: "z"
  tips: 〔拼音〕

key_binder:
  import_preset: default
  bindings:
    - { accept: "Control+Shift+E", toggle: emoji_suggestion, when: always }
    - { accept: "Control+Shift+1", toggle: transcription, when: has_menu }
    - { accept: "Control+j", send: Down, when: has_menu }
    - { accept: "Control+k", send: Up, when: has_menu }
    - { accept: "Control+h", send: Page_Up, when: has_menu }
    - { accept: "Control+l", send: Page_Down, when: has_menu }

punctuator:
  import_preset: symbols
  # 定义部分半角字符
  half_shape:
    "#": "#"
    "*": "*"
    ".": ["。"]
    "`": "`"
    "~": "~"
    "@": "@"
    "=": "="
    "/": ["/", "÷"]
    '\': "、"
    "_": "──"
    "'": { pair: ["「", "」"] }
    "[": ["【", "["]
    "]": ["】", "]"]
    "$": ["¥", "$", "€", "£", "¢", "¤"]
    "<": ["《", "〈", "«", "<"]
    ">": ["》", "〉", "»", ">"]

menu:
  page_size: 9
